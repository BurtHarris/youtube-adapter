name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, pwsh)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Build and test
        shell: pwsh
        run: ./build.ps1

  test-windows-powershell:
    name: Test (windows-latest, PowerShell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test
        shell: powershell
        run: ./build.ps1
